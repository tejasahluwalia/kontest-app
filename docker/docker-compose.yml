services:
  postgres:
    image: postgres:17.4-alpine
    shm_size: 1g
    container_name: postgres
    platform: linux/amd64
    user: postgres
    ports:
      - "5432:5432"
    restart: "always"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres

volumes:
  postgres_data:
    name: postgres_data
    driver: local
